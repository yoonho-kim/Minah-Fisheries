<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우주 스타 리그 | 클라스 팀 VS 광모 팀</title>
    <meta
      name="description"
      content="친구들과 함께 클라스 팀과 광모 팀의 대결 승자를 예측하고 실시간 배팅 비율을 확인하는 우주 스타 리그 페이지입니다."
    />
    <link rel="preload" as="image" href="assets/space-league-arena.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="league-shell">
      <section class="arena" aria-labelledby="page-title">
        <header class="topbar">
          <a class="brand" href="/" aria-label="우주 스타 리그 홈">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>
              <strong>우주 스타 리그</strong>
              <em>FRIENDS MATCH BET</em>
            </span>
          </a>
          <div class="live-pill" aria-label="라이브 진행 중">
            <span aria-hidden="true"></span>
            LIVE
          </div>
        </header>

        <div class="match-stage">
          <article class="team-card team-card-a" aria-labelledby="team-a-name">
            <p class="team-label">A SIDE</p>
            <h2 id="team-a-name">클라스 팀</h2>
            <p class="team-tag">전통강자</p>
            <dl class="team-stats">
              <div>
                <dt>배팅</dt>
                <dd><span id="team-a-count">0</span>표</dd>
              </div>
              <div>
                <dt>예상 배당</dt>
                <dd id="team-a-odds">1.00</dd>
              </div>
            </dl>
            <button class="bet-button bet-a" type="button" data-team="a">클라스 팀에 배팅</button>
          </article>

          <div class="versus-panel" aria-label="현재 대결 정보">
            <p class="event-kicker">ONE NIGHT DUEL</p>
            <h1 id="page-title">A <span>VS</span> B</h1>
            <div class="ratio-board">
              <span id="ratio-a">50</span>
              <strong>:</strong>
              <span id="ratio-b">50</span>
            </div>
            <p class="ratio-label">실시간 배팅 비율</p>
            <div class="meter" aria-hidden="true">
              <span id="meter-a"></span>
              <span id="meter-b"></span>
            </div>
            <p class="user-pick" id="user-pick">아직 배팅하지 않았습니다.</p>
          </div>

          <article class="team-card team-card-b" aria-labelledby="team-b-name">
            <p class="team-label">B SIDE</p>
            <h2 id="team-b-name">광모 팀</h2>
            <p class="team-tag">도전자 87 대표 젊은 피</p>
            <dl class="team-stats">
              <div>
                <dt>배팅</dt>
                <dd><span id="team-b-count">0</span>표</dd>
              </div>
              <div>
                <dt>예상 배당</dt>
                <dd id="team-b-odds">1.00</dd>
              </div>
            </dl>
            <button class="bet-button bet-b" type="button" data-team="b">광모 팀에 배팅</button>
          </article>
        </div>

        <section class="live-board" aria-label="실시간 배팅 현황">
          <div class="board-head">
            <div>
              <p>LIVE BOARD</p>
              <h2>배팅 현황</h2>
            </div>
            <output id="total-count" aria-live="polite">총 0표</output>
          </div>
          <ol class="activity-list" id="activity-list" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <script src="league.js"></script>
  </body>
</html>
